name = "2hjs-tracker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "REDACTED_ACCOUNT_ID"

# Environment variables (set via wrangler secret or dashboard)
vars = { DEV_MODE = "false", DEV_EMAIL = "dev@example.com" }

# Required secrets (set via: wrangler secret put <NAME>):
# - ADMIN_EMAIL: Your email address for admin access

# Worker will be available at: https://2hjs-tracker.eviemariekolb.workers.dev

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "2hjs-tracker-db"
database_id = "8099011b-afab-46e2-9308-ddea6363dc4c"

# KV Namespace binding
[[kv_namespaces]]
binding = "KV"
id = "47d8977bfe5f4591a0dee56fc243b030"

[env.production]
# Optional: Custom domain for API (commented out - using workers.dev URL)
# routes = [
#   { pattern = "api.jobsearch.kongaiwen.dev/*", zone_name = "kongaiwen.dev" }
#]

[env.development]
# Local development configuration
[[env.development.d1_databases]]
binding = "DB"
database_name = "2hjs-tracker-db"
database_id = "local"  # Uses local SQLite for development

[[env.development.kv_namespaces]]
binding = "KV"
id = "local"  # Uses mock KV for development

# Build configuration
[build]
command = "echo 'No build step required for TypeScript with Wrangler'"

# TypeScript configuration
[ts_build]
command = "tsc"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true