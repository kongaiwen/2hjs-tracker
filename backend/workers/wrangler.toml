name = "2hjs-tracker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
# Set your Cloudflare account_id here or via CLOUDFLARE_ACCOUNT_ID env var
account_id = ""

# Environment variables (set via wrangler secret or dashboard)
vars = { DEV_MODE = "false", DEV_EMAIL = "dev@example.com" }

# Required secrets (set via: wrangler secret put <NAME>):
# - ADMIN_EMAIL: Your email address for admin access

# Worker will be available at: https://2hjs-tracker.<your-subdomain>.workers.dev

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "2hjs-tracker-db"
database_id = ""  # Set via: wrangler d1 create 2hjs-tracker-db

# KV Namespace binding
[[kv_namespaces]]
binding = "KV"
id = ""  # Set via: wrangler kv namespace create KV

[env.production]
# Optional: Custom domain for API (commented out - using workers.dev URL)
# routes = [
#   { pattern = "api.your-domain.dev/*", zone_name = "your-domain.dev" }
#]

[env.development]
# Local development configuration
[[env.development.d1_databases]]
binding = "DB"
database_name = "2hjs-tracker-db"
database_id = "local"  # Uses local SQLite for development

[[env.development.kv_namespaces]]
binding = "KV"
id = "local"  # Uses mock KV for development

# Build configuration
[build]
command = "echo 'No build step required for TypeScript with Wrangler'"

# TypeScript configuration
[ts_build]
command = "tsc"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true